name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      matrix:
        # macOS temporarily disabled due to SBCL memory corruption on GH runner images
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Roswell (Linux)
        if: runner.os == 'Linux'
        env:
          LISP: sbcl-bin/2.5.0
        run: |
          curl -L https://raw.githubusercontent.com/roswell/roswell/master/scripts/install-for-ci.sh | sh
          echo "$HOME/.roswell/bin" >> "$GITHUB_PATH"

      - name: Install Roswell (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install roswell
          ros install sbcl-bin/2.5.0
          echo "$HOME/.roswell/bin" >> "$GITHUB_PATH"

      - name: Vendor slynk-client
        # slynk-client is not carried by any Quicklisp distribution. Drop it
        # into Roswell's local-projects so ASDF can resolve it during
        # `ros install` and the test run. Pin the SHA for build determinism.
        env:
          SLYNK_CLIENT_URL: https://github.com/fade/slynk-client.git
          SLYNK_CLIENT_REV: f232d4dbbed03ff62ef8419eea580d2dfb9999de
        run: |
          set -eu
          target="$HOME/.roswell/local-projects/slynk-client"
          mkdir -p "$(dirname "$target")"
          git clone "$SLYNK_CLIENT_URL" "$target"
          git -C "$target" checkout "$SLYNK_CLIENT_REV"

      - name: Install Dependencies
        run: |
          ros --version
          ros config

          ros install rove cl-ai-project/cl-mcp

      - name: Run Tests
        run: |
          rove cl-mcp.asd
